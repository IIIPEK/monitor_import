<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title or "Monitor Import" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', path='/css/app.css') }}" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="/">Monitor Import</a>
    <div class="d-flex align-items-center gap-3">
      <span class="text-secondary small">Web prototype</span>
      {% if current_user %}
      {% if current_user.is_admin %}
      <a class="link-secondary small text-decoration-none" href="/admin">Admin</a>
      {% endif %}
      <span class="small text-secondary">{{ current_user.username }}</span>
      <form action="/logout" method="post" class="m-0">
        <button class="btn btn-outline-secondary btn-sm" type="submit">Logout</button>
      </form>
      {% else %}
      <a class="btn btn-outline-secondary btn-sm" href="/login">Login</a>
      {% endif %}
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

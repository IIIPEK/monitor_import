{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Profile</h1>
        <p class="text-secondary small mb-4">Change your account password.</p>

        {% if error %}
        <div class="alert alert-danger py-2" role="alert">
          {{ error }}
        </div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success py-2" role="alert">
          {{ success }}
        </div>
        {% endif %}

        <form action="/profile/password" method="post">
          <div class="mb-3">
            <label for="currentPassword" class="form-label">Current password</label>
            <input class="form-control" id="currentPassword" name="current_password" type="password" required>
          </div>
          <div class="mb-3">
            <label for="newPassword" class="form-label">New password</label>
            <input class="form-control" id="newPassword" name="new_password" type="password" required>
          </div>
          <button class="btn btn-primary" type="submit">Update password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
